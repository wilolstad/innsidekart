name: Nattlig oppdatering

on:
  schedule:
    - cron: "30 4 * * *"   # 04:30 UTC = 06:30 norsk sommertid
  workflow_dispatch:        # manuell kjøring fra Actions-fanen

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer avhengigheter
        run: pip install requests yfinance

      - name: Kjør pipeline
        run: python pipeline.py

      # Committer dagens data: gir gratis historikk i git-loggen, og
      # commit-aktiviteten hindrer GitHub i å skru av cron etter 60 dager.
      - name: Arkiver dagens data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json index.html
          git diff --cached --quiet || git commit -m "data: nattlig oppdatering"
          git push

      - name: Klargjør site
        run: mkdir -p _site && cp index.html data.json _site/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - uses: actions/deploy-pages@v4
